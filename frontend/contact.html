{% extends 'base.html' %}
{% block title %}Contact — Samith Cloud Tech{% endblock %}

{% block content %}
<section class="page-hero">
  <h1 class="page-title">Get In Touch</h1>
  <p class="page-sub">Have a project idea, collaboration request or just want to say hi?</p>
</section>

<section class="section contact-section">
  <form class="contact-form" method="POST" action="{{ url_for('contact') }}">
    <div class="form-group">
      <label class="form-label" for="name">Name</label>
      <input  class="form-input" type="text"  id="name"    name="name"    placeholder="Your name" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input  class="form-input" type="email" id="email"   name="email"   placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="message">Message</label>
      <textarea class="form-input form-textarea" id="message" name="message" rows="6" placeholder="Tell me what you're building…" required></textarea>
    </div>
    <button class="btn btn-primary" type="submit">Send Message →</button>
  </form>

  <div class="contact-info">
    <h3 class="contact-info-title">Other ways to reach me</h3>
    <div class="contact-links">
      <a class="contact-link" href="mailto:samith@example.com">📧 samith@example.com</a>
      <a class="contact-link" href="https://linkedin.com/in/samith" target="_blank">🔗 LinkedIn</a>
      <a class="contact-link" href="https://github.com/samith" target="_blank">🐙 GitHub</a>
    </div>
  </div>
</section>
{% endblock %}
